{% extends 'base.html' %}
{% load static %}
{% block head %}
<link rel="stylesheet">
{% endblock %}
{% block content %}
<div class="page-header">
    <h2>Sign Up</h2>
</div>
{% if error_message %}
    <p style="color: red;">{{ error_message }}</p>
{% endif %}
<form action="" method="post" class="form-container">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <button type="submit" class="btn submit">Submit</button>
</form>

{% endblock %}

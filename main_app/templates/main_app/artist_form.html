{% extends 'base.html' %}
{% load static %}

{% block head %}

<link rel="stylesheet" />

{% endblock %}

{% block content %}

<div class="page-header">
    {% if artist %}
        <h2>Edit {{ artist.name }}</h2>
    {% else %}
        <h2>Add Artist</h2>
    {% endif %}
</div>

<form action="" method="post" class="form-container">
    {% csrf_token %}
    <table>
        {{ form.as_table}}
    </table>
    <button type="submit" class="btn submit">Submit</button>
</form>

{% endblock %}
